<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work Search Activity Tracker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.5;
        }

        h1, h2 {
            margin-bottom: 10px;
        }

        form {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            font-size: 14px;
        }

        button {
            margin-top: 20px;
            padding: 10px 16px;
            font-size: 15px;
            cursor: pointer;
        }

        #reportStatus {
            margin-top: 10px;
            font-style: italic;
        }
        .spinner {
          border: 4px solid #eee;
          border-top: 4px solid #555;
          border-radius: 50%;
          width: 28px;
          height: 28px;
          animation: spin 0.8s linear infinite;
          display: inline-block;
          margin-top: 10px;
        }

        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }

    </style>
</head>

<body>

    <h1>Work Search Activity Tracker</h1>

    <form id="entry-form">
        <label for="date">Date of Activity</label>
        <input type="date" id="date" required />

        <label for="employer">Employer</label>
        <input type="text" id="employer" placeholder="Company name" required />

        <label for="position">Position</label>
        <input type="text" id="position" placeholder="Job title" required />

        <label for="method">Method</label>
        <select id="method" required>
            <option value="">Select one</option>
            <option value="Online Application">Online Application</option>
            <option value="Email">Email</option>
            <option value="Phone Call">Phone Call</option>
            <option value="In Person">In Person</option>
            <option value="Job Fair">Job Fair</option>
            <option value="Other">Other</option>
        </select>

        <label for="notes">Notes</label>
        <textarea id="notes" rows="3" placeholder="Optional notes"></textarea>

        <button type="submit">Submit Entry</button>
        <div id="message" style="margin-top: 10px; font-weight: bold;"></div>

    </form>

    <!-- REPORT BUTTON SECTION -->
    <h2>Reports</h2>

    <button id="generateReport">Generate Two‑Week Report</button>
    <div id="reportStatus"></div>

    <!-- Scripts -->
    <script src="submit-v2.js"?v=3></script>
    <script src="report.js"></script>

</body>
</html>
