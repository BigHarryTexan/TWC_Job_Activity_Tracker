<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TWC Work Search Report</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 40px;
    line-height: 1.4;
  }

  h1 {
    text-align: center;
    margin-bottom: 5px;
  }

  .subheader {
    text-align: center;
    margin-bottom: 30px;
    font-size: 14px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }

  th, td {
    border: 1px solid #000;
    padding: 8px;
    font-size: 14px;
  }

  th {
    background: #f0f0f0;
  }

  .cert {
    margin-top: 40px;
    font-size: 14px;
  }

  .sig-line {
    margin-top: 40px;
    border-top: 1px solid #000;
    width: 300px;
    padding-top: 5px;
  }
</style>
</head>

<body>

<h1>Work Search Log</h1>
<div class="subheader" id="dateRange"></div>

<table id="reportTable">
  <tr>
    <th>Date</th>
    <th>Employer</th>
    <th>Position</th>
    <th>Method</th>
    <th>Notes</th>
  </tr>
</table>

<script>
async function loadReport() {
  const res = await fetch("https://twc-job-worker.clayharryman.workers.dev/view-raw");
  const data = await res.json();

  // -------------------------------
  // Determine 14-day reporting window
  // -------------------------------
  const today = new Date();
  const day = today.getDay(); // 0=Sun, 1=Mon...
  const mostRecentMonday = new Date(today);
  mostRecentMonday.setDate(today.getDate() - ((day + 6) % 7));

  const windowStart = new Date(mostRecentMonday);
  windowStart.setDate(mostRecentMonday.getDate() - 13);

  // -------------------------------
  // Filter entries
  // -------------------------------
  let filtered = data.entries.filter(e => {
    const d = new Date(e.date);

    // Remove test entries
    if (e.employer && e.employer.toLowerCase() === "TESTING") return false;

    return d >= windowStart && d <= mostRecentMonday;
  });

  // Sort oldest → newest
  filtered.sort((a, b) => new Date(a.date) - new Date(b.date));

  // -------------------------------
  // Populate table
  // -------------------------------
  const table = document.getElementById("reportTable");

  filtered.forEach(e => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${e.date}</td>
      <td>${e.employer}</td>
      <td>${e.position}</td>
      <td>${e.method}</td>
      <td>${e.notes}</td>
    `;
    table.appendChild(row);
  });

  // -------------------------------
  // Date range header
  // -------------------------------
  document.getElementById("dateRange").textContent =
    `Covering ${windowStart.toLocaleDateString()} through ${mostRecentMonday.toLocaleDateString()}`;
}

loadReport();
</script>

</body>
</html>
